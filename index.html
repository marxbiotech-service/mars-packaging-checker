<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火星生技 包裝合規審查系統</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3ef;
    --sidebar: #1a1a1a;
    --sidebar-text: #e8e4dc;
    --sidebar-muted: #888;
    --card: #ffffff;
    --border: #e2ddd6;
    --accent: #c0392b;
    --accent2: #8B4513;
    --text: #2c2c2c;
    --text2: #666;
    --ok: #27ae60;
    --warn: #e67e22;
    --error: #c0392b;
    --info: #2980b9;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar { width: 260px; min-width: 260px; background: var(--sidebar); color: var(--sidebar-text); display: flex; flex-direction: column; padding: 28px 20px; gap: 24px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .sidebar-brand { font-size: 11px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; font-weight: 600; }
  .sidebar-title { font-size: 22px; font-weight: 700; line-height: 1.3; margin-top: 6px; }
  .sidebar-sub { font-size: 11px; color: var(--sidebar-muted); margin-top: 4px; letter-spacing: 1px; }
  .sidebar-divider { border: none; border-top: 1px solid #333; }
  .form-label { font-size: 11px; color: var(--sidebar-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .sidebar select, .sidebar input[type="text"], .sidebar input[type="password"] {
    width: 100%; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; color: var(--sidebar-text);
    padding: 8px 10px; font-size: 13px; outline: none; transition: border 0.2s;
  }
  .sidebar select:focus, .sidebar input:focus { border-color: var(--accent); }
  .api-key-wrap { position: relative; }
  .api-key-wrap input { padding-right: 36px; }
  .api-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--sidebar-muted); cursor: pointer; font-size: 14px; }
  .sidebar-footer { font-size: 10px; color: #555; line-height: 1.7; margin-top: auto; border-top: 1px solid #2a2a2a; padding-top: 16px; }

  /* ── Main ── */
  .main { flex: 1; padding: 32px; max-width: 860px; display: flex; flex-direction: column; gap: 20px; }
  .page-header { display: flex; align-items: center; gap: 12px; }
  .page-header h1 { font-size: 20px; font-weight: 700; }
  .page-header p { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* ── Cards ── */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

  /* ── Upload ── */
  .upload-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 28px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #fdf9f5; }
  .upload-zone input { display: none; }
  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; color: var(--text2); }
  .upload-sub { font-size: 12px; color: #aaa; margin-top: 4px; }
  .preview-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
  .preview-item { position: relative; width: 100px; height: 100px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .preview-item .remove-btn { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .preview-label { font-size: 10px; color: var(--text2); text-align: center; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }

  /* ── Barcode ── */
  .bc-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .bc-row input { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 13px; outline: none; font-family: monospace; transition: border 0.2s; }
  .bc-row input:focus { border-color: var(--accent); }
  .bc-badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
  .bc-badge.ok { background: #e8f5e9; color: var(--ok); }
  .bc-badge.new { background: #fff3e0; color: var(--warn); }
  .bc-badge.dup { background: #fce4e4; color: var(--error); }
  .bc-badge.empty { background: #f0f0f0; color: #aaa; }
  .bc-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 0 4px; }
  .bc-remove:hover { color: var(--error); }
  .add-bc-btn { font-size: 12px; color: var(--accent); background: none; border: none; cursor: pointer; padding: 4px 0; }
  .add-bc-btn:hover { text-decoration: underline; }

  /* ── Product info card ── */
  .product-table { width: 100%; font-size: 12px; border-collapse: collapse; }
  .product-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .product-table td:first-child { width: 80px; color: var(--text2); white-space: nowrap; }
  .pill-red { color: var(--error); font-weight: 600; }
  .pill-warn { color: var(--warn); }

  /* ── Run button ── */
  .run-btn { width: 100%; padding: 14px; background: var(--sidebar); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; }
  .run-btn:hover { background: #333; }
  .run-btn:disabled { background: #aaa; cursor: not-allowed; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results ── */
  .score-bar { display: flex; gap: 16px; margin-bottom: 16px; }
  .score-box { flex: 1; text-align: center; padding: 14px; border-radius: 8px; }
  .score-box .num { font-size: 28px; font-weight: 700; }
  .score-box .lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .score-box.error { background: #fce4e4; color: var(--error); }
  .score-box.warn { background: #fff3e0; color: var(--warn); }
  .score-box.ok { background: #e8f5e9; color: var(--ok); }
  .score-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; float: right; }
  .score-badge.fail { background: #fce4e4; color: var(--error); }
  .score-badge.warn { background: #fff3e0; color: var(--warn); }
  .score-badge.pass { background: #e8f5e9; color: var(--ok); }
  .summary-text { font-size: 14px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: #fff; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { background: var(--sidebar); color: #fff; border-color: var(--sidebar); }
  .issue-list { display: flex; flex-direction: column; gap: 10px; }
  .issue-item { display: flex; gap: 12px; padding: 12px 14px; border-radius: 8px; border-left: 3px solid transparent; }
  .issue-item.error { background: #fff5f5; border-color: var(--error); }
  .issue-item.warn { background: #fffbf0; border-color: var(--warn); }
  .issue-item.ok { background: #f0faf3; border-color: var(--ok); }
  .issue-item.info { background: #f0f7ff; border-color: var(--info); }
  .issue-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .error .issue-dot { background: var(--error); }
  .warn .issue-dot { background: var(--warn); }
  .ok .issue-dot { background: var(--ok); }
  .info .issue-dot { background: var(--info); }
  .issue-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .issue-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }

  /* ── Bottom actions ── */
  .action-bar { display: flex; justify-content: flex-end; gap: 10px; padding-top: 4px; }
  .btn-reject { padding: 9px 20px; border-radius: 8px; border: 1px solid var(--error); color: var(--error); background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-approve { padding: 9px 20px; border-radius: 8px; border: none; background: var(--ok); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-reject:hover { background: #fce4e4; }
  .btn-approve:hover { background: #219a52; }

  .hidden { display: none; }
</style>
</head>

<!-- ── Sidebar ── -->
<div class="sidebar">
  <div>

</div>

<!-- ── Main ── -->
<div class="main">

  <div class="page-header">

      <div class="upload-icon">🖼</div>

      <div class="upload-sub">支援 JPG、PNG，每次最多 5 張</div>
    </div>
    <div class="preview-grid" id="previewGrid"></div>
  </div>

  <!-- Barcode -->
  <div class="card">
    <div class="card-title">📊 條碼登記與比對</div>
    <div id="bcList">
      <div class="bc-row">
        <input type="text" class="bc-input" placeholder="輸入設計稿上的條碼號碼（EAN-13）" maxlength="20">

</div>

{"summary":"整體評語（2句話）","score":"pass或warn或fail","issues":[{"level":"error或warn或ok或info","title":"問題標題","desc":"具體說明，指出設計稿上的位置或文字"}]}`;

const COSMETIC_PROMPT = `你是台灣化粧品包裝合規審查專家。請仔細分析設計稿圖片上的所有文字，審查以下項目：

【化粧品標示必要項目（化粧品衛生安全管理法第7條）】
1. 中文品名
2. 用途
3. 用法
4. 淨重、容量或數量
5. 全成分名稱（依含量多寡排列）
6. 製造廠商名稱及地址（輸入品加標輸入廠商名稱及地址）
7. 製造日期或批號
8. 保存期限或有效日期
9. 保存方法
10. 警語（如有特定成分）

【常見問題】
- 全成分未依INCI名稱標示
- 保存期限格式錯誤
- 未標示批號或製造日期
- 特定成分未加警語
- 廠商資訊不完整

【回傳格式】只回傳JSON，不要有任何其他文字或markdown：
{"summary":"整體評語（2句話）","score":"pass或warn或fail","issues":[{"level":"error或warn或ok或info","title":"問題標題","desc":"具體說明，指出設計稿上的位置或文字"}]}`;

// ══════════════════════════════════════════════
// 輔助函式
// ══════════════════════════════════════════════
function findProductByBarcode(bc) { return PRODUCT_DB.find(p => p.barcode === bc); }
function findProductByName(name) {
  if (!name) return null;
  const n = name.trim();
  return PRODUCT_DB.find(p => p.name.includes(n) || n.includes(p.name.replace(/（.*?）/g,'').trim()));
}

function checkBC(val) {
  if (!val) return { cls:'empty', text:'未填寫' };
  const dupes = Array.from(document.querySelectorAll('.bc-input')).map(i=>i.value.trim()).filter(v=>v===val);
  if (dupes.length > 1) return { cls:'dup', text:'重複' };
  const found = BARCODE_DB.find(d => d.barcode === val);
  if (found) return { cls:'ok', text:`✓ ${found.brand}｜${found.name}` };
  return { cls:'new', text:'★ 新條碼（未登記）' };
}

function updateBadge(input) {
  const badge = input.closest('.bc-row').querySelector('.bc-badge');
  const { cls, text } = checkBC(input.value.trim());
  badge.className = 'bc-badge ' + cls;
  badge.textContent = text;
  showProductInfo();
}

function addBarcodeRow() {
  const row = document.createElement('div');
  row.className = 'bc-row';
  row.innerHTML = `<input type="text" class="bc-input" placeholder="輸入條碼號碼（EAN-13）" maxlength="20"><span class="bc-badge empty">未填寫</span><button class="bc-remove" onclick="this.closest('.bc-row').remove();showProductInfo()">×</button>`;
  row.querySelector('input').addEventListener('input', e => updateBadge(e.target));
  document.getElementById('bcList').appendChild(row);
}

function showProductInfo() {
  const bcVals = Array.from(document.querySelectorAll('.bc-input')).map(i=>i.value.trim()).filter(Boolean);
  const productName = document.getElementById('productName').value.trim();
  let p = null;
  for (const v of bcVals) { p = findProductByBarcode(v); if (p) break; }
  if (!p && productName) p = findProductByName(productName);
  const card = document.getElementById('productInfoCard');
  const content = document.getElementById('productInfoContent');
  if (!p) { card.classList.add('hidden'); return; }
  card.classList.remove('hidden');
  const isAllergen = a => a && a !== '無常見過敏原' && a !== '無特別標示';
  const rows = [
    ['品牌', p.brand], ['產品名稱', p.name], ['規格', p.spec],
    ['保存期限', p.shelf_life], ['原產地', p.origin], ['劑型', p.form],
    ['食用/用法', p.serving], ['保存方式', p.storage],
    ['過敏原', `<span class="${isAllergen(p.allergens)?'pill-red':''}">${p.allergens}</span>`],
    ['注意事項', `<span class="pill-warn">${p.warnings}</span>`],
    ['禁用族群', p.prohibited], ['全成分', p.ingredients],
  ];
  content.innerHTML = `<table class="product-table">${rows.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table>`;
}

// ══════════════════════════════════════════════
// 上傳
// ══════════════════════════════════════════════
let uploadedFiles = [];
const zone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const grid = document.getElementById('previewGrid');

zone.addEventListener('click', () => fileInput.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  Array.from(files).slice(0, 5 - uploadedFiles.length).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      uploadedFiles.push({ data: e.target.result, type: file.type, name: file.name });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
}

function renderPreviews() {
  grid.innerHTML = uploadedFiles.map((f,i) => `
    <div>
      <div class="preview-item">
        <img src="${f.data}">
        <button class="remove-btn" onclick="removeFile(${i})">×</button>
      </div>
      <div class="preview-label">${f.name}</div>
    </div>`).join('');
}

function removeFile(i) { uploadedFiles.splice(i,1); renderPreviews(); }

// ══════════════════════════════════════════════
// 主審查邏輯
// ══════════════════════════════════════════════
let allIssues = [];
let activeFilter = 'all';

async function runCheck() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const productType = document.getElementById('productType').value;
  const pkgType = document.getElementById('pkgType').value;
  const brand = document.getElementById('brand').value;
  const productName = document.getElementById('productName').value.trim();

  // Key 在 Cloudflare Worker 裡，不需要前端驗證
  if (!productType) { alert('請選擇產品類型'); return; }
  if (uploadedFiles.length === 0) { alert('請上傳設計稿圖片'); return; }

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> AI 審查中…';
  document.getElementById('resultSection').classList.add('hidden');
  document.getElementById('actionBar').classList.add('hidden');

  // 條碼分析
  const bcVals = Array.from(document.querySelectorAll('.bc-input')).map(i=>i.value.trim()).filter(Boolean);
  const dupBc = bcVals.filter((v,i,a) => a.indexOf(v) !== i);
  const matchBc = bcVals.filter(v => BARCODE_DB.find(d=>d.barcode===v));
  const newBc = bcVals.filter(v => !BARCODE_DB.find(d=>d.barcode===v));

  // 產品資料比對
  let p = null;
  for (const v of bcVals) { p = findProductByBarcode(v); if (p) break; }
  if (!p && productName) p = findProductByName(productName);

  const productDataBlock = p ? `
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📦 產品資料庫（請逐一核查設計稿是否與以下資料一致）：
品牌：${p.brand}
產品名稱：${p.name}
規格：${p.spec}
保存期限：${p.shelf_life}
原產地：${p.origin}
劑型：${p.form}
食用/用法：${p.serving}
保存方式：${p.storage}
過敏原：${p.allergens}
注意事項：${p.warnings}
禁用族群：${p.prohibited}
全成分：${p.ingredients}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
若設計稿上的任何欄位與上述不符，請列為問題項目。` : '';

  const ptLabel = productType === 'food' ? '食品／保健食品' : '保養品／化妝品';
  const pkgLabel = { box:'彩盒', bottle:'瓶器標籤', sticker:'貼紙', pouch:'袋裝' }[pkgType] || '未指定';

  const systemPrompt = (productType === 'food' ? FOOD_PROMPT : COSMETIC_PROMPT) + `

審查資訊：
品牌：${brand || '未提供'}
產品名稱：${productName || '未提供'}
產品類型：${ptLabel}
包裝類型：${pkgLabel}
設計稿條碼：${bcVals.join('、') || '未提供'}
${dupBc.length ? `⚠️ 重複條碼：${dupBc.join('、')}` : ''}
${newBc.length ? `★ 新條碼（未登記）：${newBc.join('、')}` : ''}
${matchBc.length ? `✓ 已登記條碼：${matchBc.map(v=>{const d=BARCODE_DB.find(x=>x.barcode===v);return `${v}（${d.brand}｜${d.name}）`;}).join('、')}` : ''}
${productDataBlock}`;

  const userContent = [
    ...uploadedFiles.map(f => ({
      type: "image",
      source: { type: "base64", media_type: f.type, data: f.data.split(',')[1] }
    })),
    { type: "text", text: "請審查以上包裝設計稿，回傳JSON格式審查報告。只回JSON，不要有任何其他文字。" }
  ];

  try {
    const resp = await fetch("https://mars-api-proxy.finnchang.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        apiKey: apiKey,
        model: "claude-haiku-4-5-20251001",
        max_tokens: 4096,
        system: systemPrompt,
        messages: [{ role: "user", content: userContent }]
      })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    let text = data.content?.[0]?.text || '';
    text = text.replace(/```json|```/g, '').trim();
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('AI 回傳格式異常，請重試');
    const parsed = JSON.parse(jsonMatch[0]);

    // 注入條碼問題
    if (dupBc.length) parsed.issues.unshift({ level:'error', title:'條碼重複', desc:`條碼 ${dupBc.join('、')} 在同一份設計稿中重複出現，請確認各包裝使用獨立條碼。` });
    if (newBc.length) parsed.issues.push({ level:'warn', title:'新條碼未登記', desc:`${newBc.join('、')} 不在現有條碼資料庫中，請確認是否為正確新品條碼並更新登記。` });

    allIssues = parsed.issues || [];
    activeFilter = 'all';
    renderResults(parsed);

  } catch (err) {
    document.getElementById('resultSection').classList.remove('hidden');
    allIssues = [{ level:'error', title:'審查失敗', desc: err.message }];
    renderResults({ summary:'審查過程發生錯誤，請確認 API Key 是否正確。', score:'fail', issues: allIssues });
  }

  btn.disabled = false;
  btn.innerHTML = '🔍 重新審查';
}

function renderResults(parsed) {
  document.getElementById('resultSection').classList.remove('hidden');
  document.getElementById('actionBar').classList.remove('hidden');

  const badge = document.getElementById('scoreBadge');
  const scoreMap = { pass:['✅ 符合規定','pass'], warn:['⚠️ 需要修改','warn'], fail:['🔴 有重大缺失','fail'] };
  const [lbl, cls] = scoreMap[parsed.score] || ['未知','warn'];
  badge.className = 'score-badge ' + cls;
  badge.textContent = lbl;

  const errors = allIssues.filter(i=>i.level==='error').length;
  const warns = allIssues.filter(i=>i.level==='warn').length;
  const oks = allIssues.filter(i=>i.level==='ok').length;
  document.getElementById('scoreBar').innerHTML = `
    <div class="score-box error"><div class="num">${errors}</div><div class="lbl">必須修正</div></div>
    <div class="score-box warn"><div class="num">${warns}</div><div class="lbl">建議修改</div></div>
    <div class="score-box ok"><div class="num">${oks}</div><div class="lbl">符合規定</div></div>`;

  document.getElementById('summaryText').textContent = parsed.summary || '';

  const filterBar = document.getElementById('filterBar');
  filterBar.innerHTML = ['all','error','warn','ok','info'].map(f => {
    const labels = { all:'全部', error:'必須修正', warn:'建議修改', ok:'符合規定', info:'參考資訊' };
    return `<button class="filter-btn${activeFilter===f?' active':''}" onclick="setFilter('${f}')">${labels[f]}</button>`;
  }).join('');

  renderIssues();
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === {all:'全部',error:'必須修正',warn:'建議修改',ok:'符合規定',info:'參考資訊'}[f]));
  renderIssues();
}

function renderIssues() {
  const list = activeFilter === 'all' ? allIssues : allIssues.filter(i=>i.level===activeFilter);
  document.getElementById('issueList').innerHTML = list.map(i => `
    <div class="issue-item ${i.level}">
      <div class="issue-dot"></div>
      <div>
        <div class="issue-title">${i.title}</div>
        <div class="issue-desc">${i.desc}</div>
      </div>
    </div>`).join('') || '<div style="color:#aaa;font-size:13px;padding:8px 0">此分類沒有問題項目</div>';
}

// ── Init ──
document.querySelector('.bc-input').addEventListener('input', e => updateBadge(e.target));
document.getElementById('productName').addEventListener('input', showProductInfo);
</script>
</body>
</html>
