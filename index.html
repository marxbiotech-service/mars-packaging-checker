<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火星生技｜包裝合規審查系統</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-bg: #F2EFE9;
  --c-sidebar: #1C1C1A;
  --c-sidebar-border: #2E2E2B;
  --c-sidebar-text: #D6D0C4;
  --c-sidebar-muted: #6B6860;
  --c-accent: #B5371A;
  --c-card: #FFFFFF;
  --c-border: #DDD8CF;
  --c-text: #1C1C1A;
  --c-text2: #6B6860;
  --c-error: #B5371A;
  --c-warn: #C47D00;
  --c-ok: #2A7A4B;
  --c-info: #1A5FA8;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Helvetica Neue', sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  display: flex;
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ─── Sidebar ─────────────────────────────── */
.sidebar {
  width: 256px;
  min-width: 256px;
  background: var(--c-sidebar);
  color: var(--c-sidebar-text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: sticky;
  top: 0;
  overflow-y: auto;
  padding: 24px 18px;
  gap: 20px;
}

.brand-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--c-accent);
}

.brand-title {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.25;
  margin-top: 4px;
}

.brand-sub {
  font-size: 11px;
  color: var(--c-sidebar-muted);
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.sidebar-sep { height: 1px; background: var(--c-sidebar-border); }

.field-label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--c-sidebar-muted);
  margin-bottom: 6px;
}

.sidebar-input, .sidebar-select {
  width: 100%;
  background: #252522;
  border: 1px solid var(--c-sidebar-border);
  border-radius: var(--radius-sm);
  color: var(--c-sidebar-text);
  padding: 8px 10px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}
.sidebar-input:focus, .sidebar-select:focus { border-color: var(--c-accent); }
.sidebar-select option { background: #252522; }

.key-wrap { position: relative; }
.key-wrap .sidebar-input { padding-right: 34px; font-family: monospace; font-size: 12px; }
.key-toggle {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--c-sidebar-muted);
  cursor: pointer; padding: 2px; font-size: 13px;
  transition: color .15s;
}
.key-toggle:hover { color: var(--c-sidebar-text); }

.fields { display: flex; flex-direction: column; gap: 12px; }

.sidebar-footer {
  margin-top: auto;
  border-top: 1px solid var(--c-sidebar-border);
  padding-top: 14px;
  font-size: 10px;
  color: var(--c-sidebar-muted);
  line-height: 1.8;
}

/* ─── Main ─────────────────────────────── */
.main {
  flex: 1;
  padding: 32px 36px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 900px;
}

.page-title { font-size: 22px; font-weight: 700; }
.page-desc { font-size: 13px; color: var(--c-text2); margin-top: 2px; }

/* ─── Card ─────────────────────────────── */
.card {
  background: var(--c-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  padding: 22px;
}

.card-head {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--c-text2);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 7px;
}

/* ─── Upload zone ─────────────────────────────── */
.upload-zone {
  border: 2px dashed var(--c-border);
  border-radius: var(--radius-md);
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  user-select: none;
}
.upload-zone:hover { border-color: var(--c-accent); background: #faf8f5; }
.upload-zone.drag-over { border-color: var(--c-accent); background: #fdf3f0; }

.upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-title { font-size: 14px; font-weight: 600; color: var(--c-text); }
.upload-hint { font-size: 12px; color: var(--c-text2); margin-top: 3px; }

.preview-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 16px;
}

.preview-thumb {
  position: relative;
  width: 96px;
}
.preview-thumb img {
  width: 96px; height: 96px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  border: 1px solid var(--c-border);
  display: block;
}
.preview-thumb .del {
  position: absolute; top: 4px; right: 4px;
  width: 20px; height: 20px;
  background: rgba(0,0,0,.55);
  color: #fff; border: none;
  border-radius: 50%;
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.preview-thumb .del:hover { background: var(--c-error); }
.preview-name {
  font-size: 10px; color: var(--c-text2);
  margin-top: 4px;
  text-align: center;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ─── Barcode ─────────────────────────────── */
.bc-rows { display: flex; flex-direction: column; gap: 8px; }
.bc-row { display: flex; align-items: center; gap: 8px; }
.bc-input {
  flex: 1;
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  font-size: 13px;
  font-family: monospace;
  outline: none;
  transition: border-color .15s;
  background: #fff;
}
.bc-input:focus { border-color: var(--c-accent); }
.bc-tag {
  font-size: 11px; font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.bc-tag.empty { background: #F0EDEA; color: var(--c-text2); }
.bc-tag.ok { background: #E6F4EC; color: var(--c-ok); }
.bc-tag.new { background: #FEF3E2; color: var(--c-warn); }
.bc-tag.dup { background: #FDECEA; color: var(--c-error); }
.bc-del { background: none; border: none; color: #CCC; cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px; }
.bc-del:hover { color: var(--c-error); }
.bc-add { background: none; border: none; color: var(--c-accent); font-size: 12px; font-weight: 600; cursor: pointer; padding: 2px 0; margin-top: 4px; display: inline-flex; align-items: center; gap: 4px; }
.bc-add:hover { text-decoration: underline; }

/* ─── Product info ─────────────────────────────── */
.product-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.product-table tr { border-bottom: 1px solid var(--c-border); }
.product-table tr:last-child { border-bottom: none; }
.product-table td { padding: 6px 8px; vertical-align: top; }
.product-table td:first-child { width: 80px; color: var(--c-text2); font-weight: 500; white-space: nowrap; }
.text-danger { color: var(--c-error); font-weight: 600; }
.text-warn { color: var(--c-warn); }

/* ─── Run button ─────────────────────────────── */
.run-btn {
  width: 100%;
  padding: 15px;
  background: var(--c-sidebar);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background .2s, transform .1s;
  letter-spacing: 0.3px;
}
.run-btn:hover:not(:disabled) { background: #2E2E2B; }
.run-btn:active:not(:disabled) { transform: scale(.99); }
.run-btn:disabled { opacity: .5; cursor: not-allowed; }

.spin {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Result ─────────────────────────────── */
.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.verdict {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
}
.verdict.fail { background: #FDECEA; color: var(--c-error); }
.verdict.warn { background: #FEF3E2; color: var(--c-warn); }
.verdict.pass { background: #E6F4EC; color: var(--c-ok); }

.score-row {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}
.score-box {
  flex: 1;
  padding: 14px;
  border-radius: var(--radius-md);
  text-align: center;
}
.score-box .num { font-size: 28px; font-weight: 800; line-height: 1; }
.score-box .lbl { font-size: 11px; font-weight: 600; margin-top: 4px; opacity: .75; }
.score-box.error { background: #FDECEA; color: var(--c-error); }
.score-box.warn { background: #FEF3E2; color: var(--c-warn); }
.score-box.ok { background: #E6F4EC; color: var(--c-ok); }

.summary { font-size: 13px; color: var(--c-text2); margin-bottom: 16px; line-height: 1.6; }

.filter-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--c-border);
  background: #fff;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
  color: var(--c-text2);
}
.filter-btn:hover { border-color: var(--c-text2); color: var(--c-text); }
.filter-btn.on { background: var(--c-sidebar); color: #fff; border-color: var(--c-sidebar); }

.issue-list { display: flex; flex-direction: column; gap: 10px; }
.issue {
  display: flex;
  gap: 12px;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border-left: 3px solid;
}
.issue.error { background: #FDF4F3; border-color: var(--c-error); }
.issue.warn  { background: #FDFAF3; border-color: var(--c-warn); }
.issue.ok    { background: #F3FDF6; border-color: var(--c-ok); }
.issue.info  { background: #F3F7FD; border-color: var(--c-info); }

.issue-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.error .issue-dot { background: var(--c-error); }
.warn  .issue-dot { background: var(--c-warn); }
.ok    .issue-dot { background: var(--c-ok); }
.info  .issue-dot { background: var(--c-info); }

.issue-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.issue-desc  { font-size: 12px; color: var(--c-text2); line-height: 1.55; }

/* ─── Action bar ─────────────────────────────── */
.action-bar {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}
.btn-reject {
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--c-error);
  color: var(--c-error);
  background: #fff;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s;
}
.btn-reject:hover { background: #FDECEA; }
.btn-approve {
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--c-ok);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s;
}
.btn-approve:hover { background: #236040; }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div>
    <div class="brand-eyebrow">火星生技 MARS BIOTECH</div>
    <div class="brand-title">包裝合規<br>審查系統</div>
    <div class="brand-sub">Packaging Compliance Checker</div>
  </div>

  <div class="sidebar-sep"></div>

  <div class="fields">
    <div>
      <label class="field-label">Claude API Key</label>
      <div class="key-wrap">
        <input type="password" id="apiKey" class="sidebar-input" placeholder="sk-ant-…">
        <button class="key-toggle" id="keyToggle" title="顯示／隱藏">👁</button>
      </div>
    </div>

    <div class="sidebar-sep"></div>

    <div>
      <label class="field-label">產品類型</label>
      <select id="productType" class="sidebar-select">
        <option value="">請選擇…</option>
        <option value="food">食品／保健食品</option>
        <option value="cosmetic">保養品／化妝品</option>
      </select>
    </div>

    <div>
      <label class="field-label">包裝類型</label>
      <select id="pkgType" class="sidebar-select">
        <option value="">請選擇…</option>
        <option value="box">彩盒</option>
        <option value="bottle">瓶器標籤</option>
        <option value="sticker">貼紙</option>
        <option value="pouch">袋裝</option>
      </select>
    </div>

    <div>
      <label class="field-label">品牌</label>
      <select id="brand" class="sidebar-select">
        <option value="">請選擇…</option>
        <option value="Diu+">Diu+（丟丟）</option>
        <option value="大激賞">大激賞</option>
        <option value="SnowYOU">樹飛雪 SnowYOU</option>
      </select>
    </div>

    <div>
      <label class="field-label">產品名稱（選填）</label>
      <input type="text" id="productName" class="sidebar-input" placeholder="例：Clean Coffee">
    </div>
  </div>

  <div class="sidebar-footer">
    條碼資料庫：288 筆<br>
    產品資料庫：Diu+／大激賞／樹飛雪<br>
    法規依據：食安法第22條、化粧品衛生安全管理法第7條
  </div>
</aside>

<!-- Main -->
<main class="main">

  <div>
    <div class="page-title">🔍 新稿審查</div>
    <div class="page-desc">上傳設計稿，AI 依台灣法規與產品資料庫自動審查，完成後核准或退件</div>
  </div>

  <!-- Upload -->
  <div class="card">
    <div class="card-head">📁 上傳設計稿</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple style="position:absolute;opacity:0;pointer-events:none;">
      <div class="upload-icon">🖼</div>
      <div class="upload-title">點擊選擇圖片，或將圖片拖曳至此</div>
      <div class="upload-hint">支援 JPG、PNG、WebP，每次最多 5 張</div>
    </div>
    <div class="preview-row" id="previewRow"></div>
  </div>

  <!-- Barcode -->
  <div class="card">
    <div class="card-head">📊 條碼登記與比對</div>
    <div class="bc-rows" id="bcRows">
      <div class="bc-row">
        <input type="text" class="bc-input" placeholder="輸入設計稿上的條碼（EAN-13）" maxlength="20">
        <span class="bc-tag empty">未填寫</span>
      </div>
    </div>
    <button class="bc-add" onclick="addBcRow()">＋ 新增條碼</button>
  </div>

  <!-- Product info -->
  <div class="card hidden" id="productCard">
    <div class="card-head">📋 產品資料庫比對
      <span style="font-size:10px;font-weight:400;color:#aaa;margin-left:4px;">供 AI 對照審查</span>
    </div>
    <div id="productContent"></div>
  </div>

  <!-- Run -->
  <button class="run-btn" id="runBtn" onclick="runCheck()">
    🔍 開始 AI 合規審查
  </button>

  <!-- Result -->
  <div class="card hidden" id="resultCard">
    <div class="result-header">
      <div class="card-head" style="margin:0">審查報告</div>
      <span class="verdict" id="verdict"></span>
    </div>
    <div class="score-row" id="scoreRow"></div>
    <div class="summary" id="summary"></div>
    <div class="filter-row" id="filterRow"></div>
    <div class="issue-list" id="issueList"></div>
  </div>

  <!-- Actions -->
  <div class="action-bar hidden" id="actionBar">
    <button class="btn-reject" onclick="doReject()">🔴 退件修改</button>
    <button class="btn-approve" onclick="doApprove()">✅ 核准放行</button>
  </div>

</main>

function findProductByBarcode(bc) {
  return PRODUCT_DB.find(p => p.barcode === bc) || null;
}

function findProductByName(name) {
  if (!name) return null;
  const n = name.trim().toLowerCase();
  return PRODUCT_DB.find(p =>
    p.name.toLowerCase().includes(n) ||
    n.includes(p.name.toLowerCase().replace(/（.*?）/g, '').trim())
  ) || null;
}

function getBcStatus(val) {
  if (!val) return { cls: 'empty', text: '未填寫' };
  const allVals = Array.from(document.querySelectorAll('.bc-input')).map(i => i.value.trim());
  if (allVals.filter(v => v === val).length > 1) return { cls: 'dup', text: '⚠ 重複' };
  const found = BARCODE_DB.find(d => d.barcode === val);
  if (found) return { cls: 'ok', text: `✓ ${found.brand}｜${found.name}` };
  return { cls: 'new', text: '★ 新條碼' };
}

function refreshBcRow(input) {
  const row = input.closest('.bc-row');
  const tag = row.querySelector('.bc-tag');
  const { cls, text } = getBcStatus(input.value.trim());
  tag.className = `bc-tag ${cls}`;
  tag.textContent = text;
  refreshProductCard();
}

function addBcRow() {
  const row = document.createElement('div');
  row.className = 'bc-row';
  row.innerHTML = `
    <input type="text" class="bc-input" placeholder="輸入設計稿上的條碼（EAN-13）" maxlength="20">
    <span class="bc-tag empty">未填寫</span>
    <button class="bc-del" title="移除" onclick="this.closest('.bc-row').remove(); refreshProductCard()">×</button>`;
  row.querySelector('.bc-input').addEventListener('input', e => refreshBcRow(e.target));
  document.getElementById('bcRows').appendChild(row);
}

function refreshProductCard() {
  const bcVals = Array.from(document.querySelectorAll('.bc-input')).map(i => i.value.trim()).filter(Boolean);
  const productName = document.getElementById('productName').value.trim();

  let p = null;
  for (const v of bcVals) { p = findProductByBarcode(v); if (p) break; }
  if (!p) p = findProductByName(productName);

  const card = document.getElementById('productCard');
  if (!p) { card.classList.add('hidden'); return; }
  card.classList.remove('hidden');

  const hasAllergen = p.allergens && !['無常見過敏原', '無特別標示'].includes(p.allergens);
  const rows = [
    ['品牌', p.brand], ['產品名稱', p.name], ['規格', p.spec],
    ['保存期限', p.shelf_life], ['原產地', p.origin], ['劑型', p.form],
    ['用法', p.serving], ['保存方式', p.storage],
    ['過敏原', `<span class="${hasAllergen ? 'text-danger' : ''}">${p.allergens}</span>`],
    ['注意事項', `<span class="text-warn">${p.warnings}</span>`],
    ['禁用族群', p.prohibited],
    ['全成分', p.ingredients],
  ];
  document.getElementById('productContent').innerHTML =
    `<table class="product-table">${rows.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table>`;
}

let files = [];

const zone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

zone.addEventListener('click', () => fileInput.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => { addFiles(e.target.files); fileInput.value = ''; });

function addFiles(list) {
  const allowed = ['image/jpeg', 'image/png', 'image/webp'];
  Array.from(list).forEach(f => {
    if (!allowed.includes(f.type)) return;
    if (files.length >= 5) return;
    const reader = new FileReader();
    reader.onload = e => {
      files.push({ name: f.name, type: f.type, data: e.target.result });
      renderPreviews();
    };
    reader.readAsDataURL(f);
  });
}

function removeFile(i) {
  files.splice(i, 1);
  renderPreviews();
}

function renderPreviews() {
  document.getElementById('previewRow').innerHTML = files.map((f, i) => `
    <div class="preview-thumb">
      <img src="${f.data}" alt="${f.name}">
      <button class="del" onclick="removeFile(${i})">×</button>
      <div class="preview-name">${f.name}</div>
    </div>`).join('');
}

  const newBc  = bcVals.filter(v => !BARCODE_DB.find(d => d.barcode === v));

  // 產品資料比對
  let p = null;
  for (const v of bcVals) { p = findProductByBarcode(v); if (p) break; }
  if (!p) p = findProductByName(pName);

  const productBlock = p ? `
━━━ 產品資料庫（請逐欄比對設計稿）━━━
品牌：${p.brand}
產品名稱：${p.name}
規格：${p.spec}
保存期限：${p.shelf_life}
原產地：${p.origin}
劑型：${p.form}
用法：${p.serving}
保存方式：${p.storage}
過敏原：${p.allergens}
注意事項：${p.warnings}
禁用族群：${p.prohibited}
全成分：${p.ingredients}
━━━━━━━━━━━━━━━━━━━━━━━━━
若設計稿上任何欄位與上述資料不符，請列為問題。` : '';

  const pkgLabel = { box:'彩盒', bottle:'瓶器標籤', sticker:'貼紙', pouch:'袋裝' }[pkgType] || '未指定';
  const systemPrompt = (pType === 'food' ? PROMPT_FOOD : PROMPT_COSMETIC) + `

本次審查資訊：
品牌：${brand || '未提供'}
產品名稱：${pName || '未提供'}
包裝類型：${pkgLabel}
設計稿條碼：${bcVals.join('、') || '未提供'}
${dupBc.length  ? `⚠️ 重複條碼：${dupBc.join('、')}` : ''}
${newBc.length  ? `★ 新條碼（未登記）：${newBc.join('、')}` : ''}
${matchBc.length ? `✓ 已登記條碼：${matchBc.map(v => { const d = BARCODE_DB.find(x => x.barcode === v); return `${v}（${d.brand}｜${d.name}）`; }).join('、')}` : ''}
${productBlock}`;

  const userContent = [
    ...files.map(f => ({
      type: 'image',
      source: { type: 'base64', media_type: f.type, data: f.data.split(',')[1] }
    })),
    { type: 'text', text: '請審查以上所有設計稿圖片，回傳 JSON 格式審查報告。只回傳 JSON，不要有任何其他文字或 markdown。' }
  ];

  try {
    const resp = await fetch('https://mars-api-proxy.finnchang.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        apiKey,
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 4096,
        system: systemPrompt,
        messages: [{ role: 'user', content: userContent }]
      })
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

    let text = data.content?.[0]?.text || '';
    text = text.replace(/```json|```/g, '').trim();
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('AI 回傳格式異常，請重試');
    const parsed = JSON.parse(match[0]);

    // 注入條碼問題
    if (dupBc.length) {
      parsed.issues.unshift({ level: 'error', title: '條碼重複', desc: `條碼 ${dupBc.join('、')} 在同一份設計稿中重複出現，各包裝必須使用獨立條碼。` });
    }
    if (newBc.length) {
      parsed.issues.push({ level: 'warn', title: '新條碼未登記', desc: `${newBc.join('、')} 不在現有條碼資料庫中，請確認是否為正確的新品條碼並更新登記。` });
    }

    allIssues = parsed.issues || [];
    activeFilter = 'all';
    renderResult(parsed);

  } catch (err) {
    allIssues = [{ level: 'error', title: '審查失敗', desc: err.message }];
    renderResult({ summary: '審查過程發生錯誤。', score: 'fail', issues: allIssues });
  }

  btn.disabled = false;
  btn.innerHTML = '🔍 重新審查';
}

function renderResult(parsed) {
  document.getElementById('resultCard').classList.remove('hidden');
  document.getElementById('actionBar').classList.remove('hidden');

  const verdictMap = {
    pass: ['pass', '✅ 符合規定'],
    warn: ['warn', '⚠️ 需要修改'],
    fail: ['fail', '🔴 有重大缺失'],
  };
  const [cls, lbl] = verdictMap[parsed.score] || ['warn', '⚠️ 需要修改'];
  const v = document.getElementById('verdict');
  v.className = `verdict ${cls}`;
  v.textContent = lbl;

  const errors = allIssues.filter(i => i.level === 'error').length;
  const warns  = allIssues.filter(i => i.level === 'warn').length;
  const oks    = allIssues.filter(i => i.level === 'ok').length;
  document.getElementById('scoreRow').innerHTML = `
    <div class="score-box error"><div class="num">${errors}</div><div class="lbl">必須修正</div></div>
    <div class="score-box warn"><div class="num">${warns}</div><div class="lbl">建議修改</div></div>
    <div class="score-box ok"><div class="num">${oks}</div><div class="lbl">符合規定</div></div>`;

  document.getElementById('summary').textContent = parsed.summary || '';

  const filters = [
    { key: 'all', label: '全部' },
    { key: 'error', label: '必須修正' },
    { key: 'warn', label: '建議修改' },
    { key: 'ok', label: '符合規定' },
    { key: 'info', label: '參考資訊' },
  ];
  document.getElementById('filterRow').innerHTML = filters.map(f =>
    `<button class="filter-btn${activeFilter === f.key ? ' on' : ''}" onclick="setFilter('${f.key}')">${f.label}</button>`
  ).join('');

  renderIssues();
}

function setFilter(key) {
  activeFilter = key;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('on', b.textContent === { all:'全部', error:'必須修正', warn:'建議修改', ok:'符合規定', info:'參考資訊' }[key]);
  });
  renderIssues();
}

function renderIssues() {
  const list = activeFilter === 'all' ? allIssues : allIssues.filter(i => i.level === activeFilter);
  document.getElementById('issueList').innerHTML = list.length
    ? list.map(i => `
        <div class="issue ${i.level}">
          <div class="issue-dot"></div>
          <div>
            <div class="issue-title">${i.title}</div>
            <div class="issue-desc">${i.desc}</div>
          </div>
        </div>`).join('')
    : '<div style="color:#aaa;font-size:13px;padding:6px 0">此分類無問題項目</div>';
}

function doReject()  { alert('已標記為退件修改，請修正後重新送審。'); }
function doApprove() { alert('已核准放行！'); }

// ─── Init ──────────────────────────────────
document.getElementById('keyToggle').addEventListener('click', () => {
  const inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
});
document.querySelector('.bc-input').addEventListener('input', e => refreshBcRow(e.target));
document.getElementById('productName').addEventListener('input', refreshProductCard);
</script>
</body>
</html>
